<html>
<head>
    <title>To-Do List</title>
</head>
<body>
        <div class="card shadow-sm">
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}

          <div class="mb-3">
            <label for="id_title" class="form-label fw-semibold">
              Title <span class="text-danger">*</span>
            </label>
            <input
              type="text"
              name="title"
              id="id_title"
              value="{{ task.title|default:'' }}"
              class="form-control"
              placeholder="What needs to be done?"
              maxlength="200"
              required
            />
          </div>

          <div class="mb-3">
            <label for="id_due_date" class="form-label fw-semibold">Due Date</label>
            <input
              type="date"
              name="due_date"
              id="id_due_date"
              value="{{ task.due_date|date:'Y-m-d'|default:'' }}"
              class="form-control"
            />
          </div>

          <div class="d-flex justify-content-between">
            <a href="{% url 'task_list' %}" class="btn btn-outline-secondary">
              Cancel
            </a>
            <button type="submit" class="btn btn-primary">
              {% if task %}Save Changes{% else %}Add Task{% endif %}
            </button>
          </div>

        </form>
      </div>
    </div>
</body>
</html>
